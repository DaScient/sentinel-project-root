name: Sentinel Nexus Pulse

on:
  schedule:
    - cron: '*/15 * * * *' # Triggers every 15 minutes
  workflow_dispatch:      # Allows you to click "Run Workflow" manually for testing

jobs:
  sentinel-sync:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: 📦 Install Dependencies
        run: |
          cd ingestion_engine && pip install .

      - name: ☄️ Execute Ingestion
        env:
          NASA_FIRMS_KEY: ${{ secrets.NASA_FIRMS_KEY }}
        run: python ingestion_engine/scraper_main.py
          
      - name: 🧠 Execute Cognitive Sieve (Gemini AI)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ingestion_engine/nlp_processor.py

      - name: 🛡️ Generate Handshake & Push to Edge
        env:
          CF_URL: "https://sentinel-nexus-gateway.aristocles24.workers.dev/ingest"
          SECRET_SALT: ${{ secrets.SALT }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          # 1. Generate the daily SHA-256 Token (SALT + YYYY-MM-DD in UTC)
          CURRENT_DATE=$(date -u +%Y-%m-%d)
          COMBINED_STR="${SECRET_SALT}${CURRENT_DATE}"
          AUTH_TOKEN=$(echo -n "$COMBINED_STR" | sha256sum | awk '{print $1}')
          
          echo "Handshake generated for $CURRENT_DATE"
          
          # 2. POST the fused data with Zero Trust Service Headers
          curl -X POST "$CF_URL" \
            -H "Authorization: Bearer $AUTH_TOKEN" \
            -H "CF-Access-Client-Id: $CF_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_CLIENT_SECRET" \
            -H "Content-Type: application/json" \
            -d @fused_state.json
