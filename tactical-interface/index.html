<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL NEXUS | Tactical Battlespace</title>
    <link rel="stylesheet" href="tactical-styles.css">
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>
    <div id="globeViz"></div>

    <div class="hud-top-bar glass-panel">
        <div class="brand">
            <span class="glitch-text" data-text="SENTINEL NEXUS">SENTINEL NEXUS</span>
            <span class="version">v1.5.0-SECURE</span>
        </div>
        <div class="status-container">
            <div id="connection-dot" class="status-dot"></div>
            <span id="status-indicator">SYSTEM ONLINE // AWAITING SYNC</span>
        </div>
        <div id="utc-clock" class="clock">--:--:-- UTC</div>
    </div>

    <div id="detail-panel" class="glass-panel side-panel hidden">
        <div class="panel-header">
            <h3>TARGET_ANALYSIS</h3>
            <button onclick="closePanel()" class="close-btn">[X]</button>
        </div>
        <hr>
        <h2 id="intel-headline">Awaiting Selection...</h2>
        <div class="data-grid">
            <div class="data-field"><span>THREAT SCORE</span> <b id="intel-score" class="alert-text">--</b></div>
            <div class="data-field"><span>GPE (LOCATION)</span> <b id="intel-gpe">--</b></div>
            <div class="data-field"><span>ADVERSARY UNIT</span> <b id="intel-unit">--</b></div>
            <div class="data-field intent-field"><span>KINETIC INTENT</span> <p id="intel-intent">--</p></div>
        </div>
        <div class="panel-footer">
            <span class="source-label">INTELLIGENCE SOURCE:</span>
            <i id="intel-source">--</i>
        </div>
    </div>

    <div class="hud-bottom-bar glass-panel">
        <marquee scrollamount="5" id="intel-ticker">INITIALIZING GLOBAL DATA STREAMS...</marquee>
    </div>

    <script src="gl-engine.js"></script>
</body>
</html>
